<section class="card full-width">
    {% if apply or logs %}
    <div class="table-wrap">
        <table>
            <thead><tr><th>Tür</th><th>Detay</th><th>Durum</th></tr></thead>
            <tbody>
                {% if apply %}
                <tr>
                    <td>Başvuru</td>
                    <td>{{ apply.company_name }}</td>
                    <td><span class="badge badge-{{ apply.status|lower|replace(' ', '-')|replace('ı','i') }}">{{ apply.status }}</span></td>
                </tr>
                {% endif %}
                {% for log in logs %}
                <tr>
                    <td>Günlük</td>
                    <td>{{ log.date.strftime('%d.%m.%Y') }} — {{ log.content[:60] }}</td>
                    <td><span class="badge badge-{{ log.status|lower|replace('ı','i') }}">{{ log.status }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <p class="empty">Kayıt yok.</p>
    {% endif %}
</section>
