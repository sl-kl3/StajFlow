<div class="stats-grid">
    <div class="stat-card {% if apply and apply.status != 'Reddedildi' %}success{% else %}warn{% endif %}">
        <div class="stat-num">{% if apply %}1{% else %}0{% endif %}</div>
        <div class="stat-label">Başvuru</div>
    </div>
    <div class="stat-card">
        <div class="stat-num">{{ logs|length }}</div>
        <div class="stat-label">Günlük</div>
    </div>
    <div class="stat-card purple">
        <div class="stat-num">{{ programs|length }}</div>
        <div class="stat-label">Açık ilan</div>
    </div>
</div>

<div class="quick-links">
    <a href="{{ url_for('panel', section='ilanlar') }}" class="quick-link-card">
        <i class="ti ti-building"></i><strong>İlanlar</strong>
    </a>
    <a href="{{ url_for('panel', section='basvurularim') }}" class="quick-link-card">
        <i class="ti ti-file-text"></i><strong>Başvurularım</strong>
    </a>
    <a href="{{ url_for('panel', section='gunluk') }}" class="quick-link-card">
        <i class="ti ti-notebook"></i><strong>Günlük</strong>
    </a>
</div>
