<section class="card approval-section">
    {% if logs %}
    <div class="approval-list">
        {% for l in logs %}
        <article class="approval-item">
            <div class="approval-main">
                <div class="approval-student">
                    <span class="avatar">{{ l.student_name[0]|upper }}</span>
                    <div>
                        <strong>{{ l.student_name }}</strong>
                        <span class="sub">{{ l.date.strftime('%d.%m.%Y %H:%M') }}</span>
                    </div>
                </div>
                <div class="approval-detail">
                    <p class="log-preview log-box">{{ l.content }}</p>
                </div>
            </div>
            <div class="approval-actions">
                <form method="POST" action="{{ url_for('action_log', log_id=l.id, action='ok') }}">
                    <button type="submit" class="btn-approve"><i class="ti ti-check"></i> Onayla</button>
                </form>
                <form method="POST" action="{{ url_for('action_log', log_id=l.id, action='no') }}" onsubmit="return confirm('Reddedilsin mi?');">
                    <button type="submit" class="btn-reject"><i class="ti ti-x"></i> Reddet</button>
                </form>
            </div>
        </article>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty-state"><i class="ti ti-circle-check"></i><p>Bekleyen günlük yok.</p></div>
    {% endif %}
</section>
