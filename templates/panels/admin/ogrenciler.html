<section class="card full-width">
    <div class="table-wrap">
        <table>
            <thead><tr><th>Ad</th><th>E-posta</th><th>Rol</th><th></th></tr></thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        {% if normalize_role(user.role) == 'admin' %}Admin
                        {% elif normalize_role(user.role) == 'danisman' %}Danışman
                        {% else %}Öğrenci{% endif %}
                    </td>
                    <td>
                        {% if user.id != current_user.id %}
                        <form method="POST" action="{{ url_for('admin_delete_user', user_id=user.id) }}" class="inline-form" onsubmit="return confirm('Silinsin mi?');">
                            <button type="submit" class="btn-no btn-sm">Sil</button>
                        </form>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
