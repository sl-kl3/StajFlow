<div class="stats-grid">
    <div class="stat-card warn">
        <div class="stat-num">{{ stats.bekleyen_basvuru }}</div>
        <div class="stat-label">Bekleyen başvuru</div>
    </div>
    <div class="stat-card warn">
        <div class="stat-num">{{ stats.bekleyen_gunluk }}</div>
        <div class="stat-label">Bekleyen günlük</div>
    </div>
    <div class="stat-card success">
        <div class="stat-num">{{ stats.onaylanan }}</div>
        <div class="stat-label">Onaylanan staj</div>
    </div>
    <div class="stat-card danger">
        <div class="stat-num">{{ stats.reddedilen }}</div>
        <div class="stat-label">Reddedilen</div>
    </div>
</div>

<div class="quick-links">
    <a href="{{ url_for('panel', section='basvuru-onay') }}" class="quick-link-card">
        <i class="ti ti-briefcase"></i>
        <strong>Başvuru Onayı</strong>
        <span>{{ stats.bekleyen_basvuru }} bekleyen</span>
    </a>
    <a href="{{ url_for('panel', section='gunluk-onay') }}" class="quick-link-card">
        <i class="ti ti-notebook"></i>
        <strong>Günlük Onayı</strong>
        <span>{{ stats.bekleyen_gunluk }} bekleyen</span>
    </a>
    <a href="{{ url_for('panel', section='gecmis') }}" class="quick-link-card">
        <i class="ti ti-history"></i>
        <strong>Son İşlemler</strong>
        <span>Geçmiş kayıtlar</span>
    </a>
</div>
